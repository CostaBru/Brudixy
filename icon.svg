<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0B1B3A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect x="20" y="20" width="216" height="216" rx="28" fill="url(#g)" filter="url(#shadow)"/>

  <!-- Stylized "in-memory" chip -->
  <rect x="62" y="64" width="132" height="92" rx="14" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2"/>
  <!-- Chip pins -->
  <g stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="3" stroke-linecap="round">
    <line x1="78" y1="56" x2="78" y2="64"/>
    <line x1="98" y1="56" x2="98" y2="64"/>
    <line x1="118" y1="56" x2="118" y2="64"/>
    <line x1="138" y1="56" x2="138" y2="64"/>
    <line x1="158" y1="56" x2="158" y2="64"/>
    <line x1="178" y1="56" x2="178" y2="64"/>

    <line x1="78" y1="156" x2="78" y2="164"/>
    <line x1="98" y1="156" x2="98" y2="164"/>
    <line x1="118" y1="156" x2="118" y2="164"/>
    <line x1="138" y1="156" x2="138" y2="164"/>
    <line x1="158" y1="156" x2="158" y2="164"/>
    <line x1="178" y1="156" x2="178" y2="164"/>

    <line x1="54" y1="82" x2="62" y2="82"/>
    <line x1="54" y1="102" x2="62" y2="102"/>
    <line x1="54" y1="122" x2="62" y2="122"/>
    <line x1="54" y1="142" x2="62" y2="142"/>

    <line x1="194" y1="82" x2="202" y2="82"/>
    <line x1="194" y1="102" x2="202" y2="102"/>
    <line x1="194" y1="122" x2="202" y2="122"/>
    <line x1="194" y1="142" x2="202" y2="142"/>
  </g>

  <!-- DataSet / table stack -->
  <g>
    <rect x="74" y="114" width="156" height="96" rx="16" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.60" stroke-width="2"/>
    <rect x="66" y="106" width="156" height="96" rx="16" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.40" stroke-width="2"/>
    <rect x="58" y="98" width="156" height="96" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="2"/>

    <!-- Grid lines on top table -->
    <g stroke="#FFFFFF" stroke-opacity="0.70" stroke-width="2">
      <line x1="86" y1="138" x2="214" y2="138"/>
      <line x1="86" y1="156" x2="214" y2="156"/>
      <line x1="86" y1="174" x2="214" y2="174"/>

      <line x1="118" y1="128" x2="118" y2="198"/>
      <line x1="150" y1="128" x2="150" y2="198"/>
      <line x1="182" y1="128" x2="182" y2="198"/>
    </g>

    <!-- Small "bolt" indicating fast in-memory -->
    <path d="M196 124 L178 156 H194 L176 192" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
