name: Publish NuGet packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet version (SemVer), e.g. 1.2.3'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, pack, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            v="${{ inputs.version }}"
          else
            # refs/tags/v1.2.3 -> 1.2.3
            ref="${GITHUB_REF#refs/tags/}"
            v="${ref#v}"
          fi

          if [[ -z "$v" ]]; then
            echo "Version is empty" >&2
            exit 1
          fi

          # Basic SemVer check (allows prerelease/build too)
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\.-][0-9A-Za-z\.-]+)?$ ]]; then
            echo "Version is not valid SemVer-ish: $v" >&2
            exit 1
          fi

          echo "nuget_version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Brudixy.sln

      - name: Build (Release)
        run: dotnet build Brudixy.sln --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test Brudixy.sln --configuration Release --no-build

      - name: Pack (Release)
        shell: bash
        run: |
          set -euo pipefail
          out="${GITHUB_WORKSPACE}/artifacts/packages"
          mkdir -p "$out"

          # Force symbol packages in CI (some project/SDK combos won't emit .snupkg unless explicitly set)
          pack_args=(
            --configuration Release
            --no-build
            --output "$out"
            -p:PackageVersion=${{ steps.version.outputs.nuget_version }}
            -p:IncludeSymbols=true
            -p:SymbolPackageFormat=snupkg
          )

          # Pack in dependency order (also matches NUGET_PUBLISHING.md)
          dotnet pack Brudixy.Interfaces/Brudixy.Interfaces.csproj "${pack_args[@]}"
          dotnet pack Brudixy.Interfaces.Generators/Brudixy.Interfaces.Generators.csproj "${pack_args[@]}"
          dotnet pack Brudixy.Core/Brudixy.Core.csproj "${pack_args[@]}"
          dotnet pack Brudixy.Generators/Brudixy.Generators.csproj "${pack_args[@]}"
          dotnet pack Brudixy/Brudixy.csproj "${pack_args[@]}"
          dotnet pack Brudixy.TypeGenerator/Brudixy.TypeGenerator.csproj "${pack_args[@]}"

          echo "Produced packages:" 
          ls -la "$out"

          if ! compgen -G "$out"/*.nupkg > /dev/null; then
            echo "No .nupkg files were produced. Check pack output above." >&2
            exit 1
          fi

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages
          if-no-files-found: error

      - name: Publish to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NUGET_API_KEY}" ]]; then
            echo "NUGET_API_KEY secret is not set" >&2
            exit 1
          fi

          out="${GITHUB_WORKSPACE}/artifacts/packages"

          # Push normal packages
          dotnet nuget push "$out"/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

          # Push symbols (optional)
          if compgen -G "$out"/*.snupkg > /dev/null; then
            dotnet nuget push "$out"/*.snupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "No .snupkg files found to push (continuing)."
          fi
